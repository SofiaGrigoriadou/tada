<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaDa!</title>

  <link rel="stylesheet" href="style/light.css">
</head>

<body>

<h1>TaDa</h1>

<!-- 🌊 CHARACTER -->
<div class="panel">
  <h2>Character</h2>

  <p>Level: <span id="level">1</span></p>

  <div class="bar">
    <div id="charBar" class="fill"></div>
  </div>

  <p>XP: <span id="xp">0</span></p>
</div>

<hr>

<!-- 🧭 TASK INPUT -->
<input id="taskInput" placeholder="Task">

<!-- 🧠 TASK TYPE -->
<select id="taskType">

  <option value="strength">Workout (Strength)</option>
  <option value="intelligence">Study (Intelligence)</option>
  <option value="charisma">Social (Charisma)</option>
  <option value="willpower">Discipline (Willpower)</option>
  <option value="anchoring">Chores (Anchoring)</option>

</select>

<!-- 🎚 DIFFICULTY -->
<select id="taskDifficulty">

  <option value="1">1 - Very Easy</option>
  <option value="2">2 - Easy</option>
  <option value="3">3 - Medium</option>
  <option value="4">4 - Hard</option>
  <option value="5">5 - Very Hard</option>

</select>

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<hr>

<!-- 🌊 REALMS -->

<div class="realm">
  <h3>💪 Strength</h3>
  <p>Level: <span id="str">1</span></p>
  <div class="bar"><div id="strBar" class="fill"></div></div>
</div>

<div class="realm">
  <h3>🧠 Intelligence</h3>
  <p>Level: <span id="int">1</span></p>
  <div class="bar"><div id="intBar" class="fill"></div></div>
</div>

<div class="realm">
  <h3>🐚 Charisma</h3>
  <p>Level: <span id="cha">1</span></p>
  <div class="bar"><div id="chaBar" class="fill"></div></div>
</div>

<div class="realm">
  <h3>🌙 Willpower</h3>
  <p>Level: <span id="wil">1</span></p>
  <div class="bar"><div id="wilBar" class="fill"></div></div>
</div>

<div class="realm">
  <h3>🪸 Anchoring</h3>
  <p>Level: <span id="anc">1</span></p>
  <div class="bar"><div id="ancBar" class="fill"></div></div>
</div>

<script src="app.js"></script>

</body>
</html>
