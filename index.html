<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaDa!</title>
  <link rel="stylesheet" href="style/light.css">
</head>

<body>

<h1>TaDa</h1>

<div>
  <p>Level: <span id="level">1</span></p>
  <p>XP: <span id="xp">0</span></p>

  <p>STR: <span id="str">1</span></p>
  <p>INT: <span id="int">1</span></p>
  <p>CHA: <span id="cha">1</span></p>
</div>

<hr>

<input id="taskInput" placeholder="Task">

<select id="taskType">
  <option value="strength">Workout</option>
  <option value="intelligence">Study</option>
  <option value="charisma">Social</option>
</select>

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<script src="app.js"></script>

</body>
</html>
